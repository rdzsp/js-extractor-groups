js-extractor:
  name: Secret Text
  patterns:
    - regex: AIza[0-9A-Za-z-_]{35}
      description: Google API Key
    - regex: >-
        (?i:(?:captcha|recaptcha|site[_\-]?key|sitekey)[^a-zA-Z0-9]{0,50}(6L[0-9A-Za-z_-]{38}))
      description: Google reCAPTCHA site key
    - regex: ya29\.[0-9A-Za-z\-_]+
      description: Google OAuth token
    - regex: '[0-9]+-[0-9A-Za-z_]{32}\.apps\.googleusercontent\.com'
      description: Google Cloud Platform OAuth
    - regex: A[SK]IA[0-9A-Z]{16}
      description: AWS Access Key ID
    - regex: amzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
      description: Amazon MWS Auth Token
    - regex: s3\.amazonaws\.com[/]+|[a-zA-Z0-9_-]*\.s3\.amazonaws\.com
      description: Amazon AWS URL
    - regex: aws(.{0,20})?['"][0-9a-zA-Z/+]{40}['"]
      description: Amazon AWS Secret Key
    - regex: >-
        [a-z0-9.-]+\.s3\.amazonaws\.com|s3://[a-z0-9.-]+|s3-[a-z0-9-]+\.amazonaws\.com
      description: Amazon S3 Bucket
    - regex: '[a-z0-9]+\.cloudfront\.net'
      description: Amazon CloudFront URL
    - regex: EAACEdEose0cBA[0-9A-Za-z]+
      description: Facebook Access Token
    - regex: '[fF][aA][cC][eE][bB][oO][oO][kK].*[''"][0-9a-f]{32}[''"]'
      description: Facebook OAuth
    - regex: basic [a-zA-Z0-9=:_\+/-]{5,100}
      description: Authorization Basic
    - regex: bearer [a-zA-Z0-9_\-.=:_\+/]{5,100}
      description: Authorization Bearer
    - regex: api[key|_key|\s+]+[a-zA-Z0-9_\-]{5,100}
      description: Authorization API key
    - regex: key-[0-9a-zA-Z]{32}
      description: Mailgun API Key
    - regex: '[0-9a-f]{32}-us[0-9]{1,2}'
      description: Mailchimp API Key
    - regex: SG\.[0-9A-Za-z\-_]{22}\.[0-9A-Za-z\-_]{43}
      description: SendGrid API Key
    - regex: SK[0-9a-fA-F]{32}
      description: Twilio API Key
    - regex: \bAC[a-zA-Z0-9]{32}\b
      description: Twilio Account SID
    - regex: \bAP[a-zA-Z0-9]{32}\b
      description: Twilio App SID
    - regex: >-
        "api_token":"(xox[a-zA-Z]-[a-zA-Z0-9-]+)"|xox[baprs]-([0-9a-zA-Z]{10,48})
      description: Slack Token
    - regex: >-
        https://hooks\.slack\.com/services/T[a-zA-Z0-9_]{8}/B[a-zA-Z0-9_]{8}/[a-zA-Z0-9_]{24}
      description: Slack Webhook
    - regex: https://discord\.com/api/webhooks/[0-9]{18}/[a-zA-Z0-9_-]{68}
      description: Discord Webhook
    - regex: '[MN][A-Za-z\d]{23}\.[\w-]{6}\.[\w-]{27}'
      description: Discord Bot Token
    - regex: access_token\$production\$[0-9a-z]{16}\$[0-9a-f]{32}
      description: PayPal Braintree Access Token
    - regex: sq0csp-[ 0-9A-Za-z\-_]{43}|sq0[a-z]{3}-[0-9A-Za-z\-_]{22,43}
      description: Square OAuth Secret
    - regex: sqOatp-[0-9A-Za-z\-_]{22}|EAAAEL[a-zA-Z0-9]{60}
      description: Square Access Token
    - regex: sk_live_[0-9a-zA-Z]{24}
      description: Stripe Standard API Key
    - regex: rk_live_[0-9a-zA-Z]{24}
      description: Stripe Restricted API Key
    - regex: pk_live_[0-9a-zA-Z]{24}
      description: Stripe Publishable Key
    - regex: access_token\$sandbox\$[0-9a-z]{16}\$[0-9a-f]{32}
      description: PayPal Sandbox Token
    - regex: '[a-zA-Z0-9_-]*:[a-zA-Z0-9_\-]+@github\.com*'
      description: GitHub Access Token
    - regex: github_pat_[0-9a-zA-Z]{22}_[0-9a-zA-Z]{59}
      description: GitHub OAuth Token
    - regex: (ghu|ghs|ghr|ghp)_[0-9a-zA-Z]{36}
      description: GitHub App Token
    - regex: ghr_[0-9a-zA-Z]{76}
      description: GitHub Refresh Token
    - regex: glpat-[0-9a-zA-Z\-_]{20}
      description: GitLab Personal Access Token
    - regex: '-----BEGIN RSA PRIVATE KEY-----'
      description: RSA Private Key
    - regex: '-----BEGIN DSA PRIVATE KEY-----'
      description: SSH DSA Private Key
    - regex: '-----BEGIN EC PRIVATE KEY-----'
      description: SSH EC Private Key
    - regex: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
      description: PGP Private Key Block
    - regex: '-----BEGIN OPENSSH PRIVATE KEY-----'
      description: OpenSSH Private Key
    - regex: '-----BEGIN PRIVATE KEY-----'
      description: PKCS8 Private Key
    - regex: '-----BEGIN ENCRYPTED PRIVATE KEY-----'
      description: Encrypted Private Key
    - regex: ey[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*$
      description: JSON Web Token (JWT)
    - regex: bearer\s+[a-zA-Z0-9\-._~+/]+=*
      description: Bearer Token
    - regex: >-
        mysql://[a-zA-Z0-9_\-]+:[a-zA-Z0-9_\-!@#$%^&*()]+@[a-zA-Z0-9\.\-]+(?::[0-9]+)?/[a-zA-Z0-9_\-]+
      description: MySQL Connection String
    - regex: >-
        postgres(?:ql)?://[a-zA-Z0-9_\-]+:[a-zA-Z0-9_\-!@#$%^&*()]+@[a-zA-Z0-9\.\-]+(?::[0-9]+)?/[a-zA-Z0-9_\-]+
      description: PostgreSQL Connection String
    - regex: >-
        mongodb(?:\+srv)?://[a-zA-Z0-9_\-]+:[a-zA-Z0-9_\-!@#$%^&*()]+@[a-zA-Z0-9\.\-:,/?=&]+
      description: MongoDB Connection String
    - regex: (?:Server|Data Source)=[a-zA-Z0-9\.\-,]+;(?:.*)?(?:Password|Pwd)=[^;]+
      description: MSSQL Connection String
    - regex: >-
        redis://[a-zA-Z0-9_\-]*:?[a-zA-Z0-9_\-!@#$%^&*()]*@?[a-zA-Z0-9\.\-]+(?::[0-9]+)?(?:/[0-9]+)?
      description: Redis Connection String
    - regex: (?:jdbc|odbc):(?:mysql|postgres|oracle|sqlserver|mariadb)://[^\s]+
      description: Generic DB Connection (JDBC/ODBC)
    - regex: >-
        DefaultEndpointsProtocol=https;AccountName=[a-zA-Z0-9]+;AccountKey=[a-zA-Z0-9+/=]{88};
      description: Azure Storage Account Key
    - regex: >-
        (?i:(?:client[_\-]?secret|clientsecret)\s*[:=]\s*["']?([a-zA-Z0-9_~.\-]{34,40})["']?)
      description: Azure Client Secret
    - regex: >-
        [hH][eE][rR][oO][kK][uU].*[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}
      description: Heroku API Key
    - regex: dop_v1_[a-f0-9]{64}
      description: DigitalOcean Access Token
    - regex: doo_v1_[a-f0-9]{64}
      description: DigitalOcean OAuth Token
    - regex: dor_v1_[a-f0-9]{64}
      description: DigitalOcean Refresh Token
    - regex: >-
        (?i:(?:api[_-]?key|apikey|api[_-]?secret)[\s]*[=:]\s*['"]?([a-zA-Z0-9_\-]{20,})['"]?)
      description: Generic API Key
    - regex: >-
        (?i:(?:secret[_-]?key|secretkey)[\s]*[=:]\s*['"]?([a-zA-Z0-9_\-]{20,})['"]?)
      description: Generic Secret Key
    - regex: >-
        (?i:(?:access[_-]?token|accesstoken)[\s]*[=:]\s*['"]?([a-zA-Z0-9_\-\.]{20,})['"]?)
      description: Generic Access Token
    - regex: https://[a-z0-9-]+\.firebaseio\.com
      description: Firebase Database URL
    - regex: >-
        (?i:pusher[_\-\s]*(?:app[_\-\s]*)?(?:key|secret)\s*[:=]\s*['"]?([a-f0-9]{20})['"]?)
      description: Pusher Key
    - regex: (?i:pusher[_\-\s]*app[_\-\s]*id\s*[:=]\s*['"]?([0-9]{4,7})['"]?)
      description: Pusher App ID
    - regex: UA-[0-9]{4,9}-[0-9]{1,4}
      description: Google Analytics (UA)
    - regex: G-[A-Z0-9]{10}
      description: Google Analytics 4
    - regex: npm_[a-zA-Z0-9]{36}
      description: NPM Token
    - regex: pypi-AgEIcHlwaS5vcmc[A-Za-z0-9\-_]{70,}
      description: PyPI Token
    - regex: (?i:(?:client[_-]?id)[\s]*[=:]\s*['"]?([a-zA-Z0-9_\-\.]{20,})['"]?)
      description: OAuth Client ID
    - regex: (?i:(?:client[_-]?secret)[\s]*[=:]\s*['"]?([a-zA-Z0-9_\-\.]{20,})['"]?)
      description: OAuth Client Secret
    - regex: >-
        (?i:(?:aes[_-]?key|encryption[_-]?key)[\s]*[=:]\s*['"]?([a-fA-F0-9]{32,})['"]?)
      description: AES / Encryption Key
    - regex: (?i:(?:jwt[_-]?secret)[\s]*[=:]\s*['"]?([a-zA-Z0-9_\-\.]{20,})['"]?)
      description: JWT Secret
    - regex: >-
        (?i:(password\s*[`=:"]+\s*[^\s]+|password
        is\s*[`=:"]*\s*[^\s]+|pwd\s*[`=:"]*\s*[^\s]+|passwd\s*[`=:"]+\s*[^\s]+))
      description: Possible Credentials
    - regex: '://[a-zA-Z0-9]+:[a-zA-Z0-9]+@[a-zA-Z0-9]+\.[a-zA-Z]+'
      description: Basic Auth Credentials in URL
    - regex: >-
        (?i:(?:username|user)[\s]*[=:]\s*['"]?([a-zA-Z0-9_\-\.@]+)['"]?[\s,;]*(?:password|pass|pwd)[\s]*[=:]\s*['"]?([a-zA-Z0-9_\-!@#$%^&*()]+)['"]?)
      description: Username + Password pair
    - regex: pk\.[a-zA-Z0-9]{60,}
      description: Mapbox API Token
    - regex: (?i:(algolia|application)_?key['"\s:=]+[a-zA-Z0-9]{10,})
      description: Algolia API Key
    - regex: AKC[a-zA-Z0-9]{10,72}
      description: Artifactory Token
    - regex: >-
        (?i:(?:dd[_\-]api[_\-]key|datadog[_\-]api[_\-]key)\s*[:=]\s*['"]?([a-f0-9]{32})['"]?)
      description: Datadog API Key
    - regex: >-
        (?i:(?:dd[_\-]app[_\-]key|datadog[_\-]app[_\-]key)\s*[:=]\s*['"]?([a-f0-9]{40})['"]?)
      description: Datadog App Key
    - regex: sl\.[A-Za-z0-9\-_]{135}
      description: Dropbox API Token
    - regex: dt0c01\.[A-Z0-9]{24}\.[A-Z0-9]{64}
      description: Dynatrace API Token
    - regex: NRAK-[A-Z0-9]{27}
      description: New Relic API Key
    - regex: shpat_[a-fA-F0-9]{32}
      description: Shopify Access Token
    - regex: shpca_[a-fA-F0-9]{32}
      description: Shopify Custom Token
    - regex: shppa_[a-fA-F0-9]{32}
      description: Shopify Private Token
    - regex: shpss_[a-fA-F0-9]{32}
      description: Shopify Shared Secret
    - regex: \d{9}:[a-zA-Z0-9_-]{35}
      description: Telegram Bot Token
    - regex: (?i:twitter.*[1-9][0-9]+-[0-9a-zA-Z]{40})
      description: Twitter Access Token
    - regex: A{22}[a-zA-Z0-9%]{80,}
      description: Twitter Bearer Token
