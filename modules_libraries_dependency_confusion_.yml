js-extractor:
  name: Modules / Libraries (Dependency Confusion)
  patterns:
    - regex: >-
        ([sS]{0,10}require\s*\(\s*(?:"|'|`)([^"'`./\\][^"'`]*)(?:"|'|`)\s*\)[sS]{0,10})
      description: CommonJS require of external package
    - regex: >-
        ([sS]{0,10}import\s+(?:[^"'`]+\s+from\s+)?(?:"|'|`)([^"'`./\\][^"'`]*)(?:"|'|`)[sS]{0,10})
      description: ES module import of external package
    - regex: >-
        ([sS]{0,10}import\s*\(\s*(?:"|'|`)([^"'`./\\][^"'`]*)(?:"|'|`)\s*\)[sS]{0,10})
      description: Dynamic import() of external package
    - regex: >-
        ([sS]{0,10}"(dependencies|devDependencies|peerDependencies|optionalDependencies)"\s*:\s*\{[sS]{0,10}})
      description: package.json dependency blocks
    - regex: >-
        ([sS]{0,10}"(@?[a-zA-Z0-9_\-][a-zA-Z0-9_\-./]*)"\s*:\s*"([~^]?[0-9*]+[^"]*)"[sS]{0,10})
      description: Package name and version in package.json
    - regex: >-
        ([sS]{0,10}(?:"|'|`)(@[a-zA-Z0-9_\-]+\/[a-zA-Z0-9_\-]+)(?:"|'|`)[sS]{0,10})
      description: Scoped package names (@org/package)
    - regex: >-
        ([sS]{0,10}(?:registry|resolveUrl|npmRegistryServer)\s*[=:]\s*(?:"|'|`)([^"'`]+)(?:"|'|`)[sS]{0,10})
      description: Custom / private npm registry config
    - regex: >-
        ([sS]{0,10}(?:registry|@[a-zA-Z0-9_\-]+:registry)\s*=\s*(https?:\/\/[^\s]+)[sS]{0,10})
      description: .npmrc registry entries
    - regex: >-
        ([sS]{0,10}(?:unpkg\.com|cdn\.jsdelivr\.net|cdnjs\.cloudflare\.com)\/npm\/([a-zA-Z0-9_\-@/]+)[sS]{0,10})
      description: CDN-loaded npm packages
    - regex: ([sS]{0,10}externals\s*:\s*\{([^}]+)\}[sS]{0,10})
      description: Webpack externals (potential confusion target)
    - regex: ([sS]{0,10}<script[^>]+type\s*=\s*(?:"|')importmap(?:"|')[sS]{0,10})
      description: Import map script tag
